name: Speckit Clarify (Post-Merge)

on:
  push:
    branches:
      - main
    paths:
      - '**/spec.md'
  workflow_dispatch:
    inputs:
      feature_dir:
        description: 'Feature directory to clarify (e.g., 001-ocr-parser). Leave empty for all changed.'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  clarify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed spec files
        id: detect
        env:
          FEATURE_INPUT: ${{ inputs.feature_dir }}
        run: |
          if [ -n "$FEATURE_INPUT" ]; then
            echo "specs=${FEATURE_INPUT}/spec.md" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- '**/spec.md' | tr '\n' ',' | sed 's/,$//')
            echo "specs=$CHANGED" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if no specs changed
        if: steps.detect.outputs.specs == ''
        run: |
          echo "No spec.md files changed in this push. Skipping."
          exit 0

      - name: Setup Python
        if: steps.detect.outputs.specs != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        if: steps.detect.outputs.specs != ''
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Cache Ollama models
        if: steps.detect.outputs.specs != ''
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ${{ runner.os }}-ollama-mistral
          restore-keys: |
            ${{ runner.os }}-ollama-

      - name: Start Ollama service
        if: steps.detect.outputs.specs != ''
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull mistral || true

      - name: Run Speckit Clarify
        if: steps.detect.outputs.specs != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGED_SPECS: ${{ steps.detect.outputs.specs }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          uv run --with PyGithub --with ollama python scripts/speckit_clarify.py
